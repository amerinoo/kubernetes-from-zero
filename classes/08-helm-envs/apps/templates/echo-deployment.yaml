apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  labels:
    environment: {{ .Values.environment | quote }}
spec:
  replicas: {{ .Values.echo.replicaCount }}
  selector:
    matchLabels:
      app: echo
      environment: {{ .Values.environment | quote }}
  template:
    metadata:
      labels:
        app: echo
        environment: {{ .Values.environment | quote }}
    spec:
      containers:
        - name: echo
          image: "{{ .Values.echo.image.repository }}:{{ .Values.echo.image.tag }}"
          ports:
            - containerPort: 80
