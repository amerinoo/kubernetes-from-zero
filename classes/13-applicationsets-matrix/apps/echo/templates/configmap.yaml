apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: echo
    environment: {{ .Values.environment | quote }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  WELCOME_MESSAGE: {{ .Values.config.welcomeMessage | quote }}
